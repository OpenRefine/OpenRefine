filter_desc=Converte a expressão 'a' em um array. Em seguida, para cada elemento do array, atribui seu valor à variável 'v', avalia a expressão 'test', que deve retornar um valor booleano. Se o valor booleano for verdadeiro, adiciona 'v' ao array de resultados.
foreach_index_desc=Converte a expressão 'a' como um array. Em seguida, para cada elemento do array, associa seu índice à variável 'i' e seu valor à variável 'v', avalia a expressão 'e' e adiciona o resultado ao array de resultados.
foreach_desc=Aloca a expressão "a" em um array. Depois, para cada elemento , associa o seu valor ao nome da variável v, aloca a expressão "e" e coloca o resultado em um array de resultados.
for_non_blank_desc=Avalia a expressão o. Se não estiver em branco, vincula o seu valor ao nome da variável v, avalia a expressão eNonBlank e retorna o resultado. Caso contrário (se o for avaliado como em branco), avalia a expressão eBlank e retorna esse resultado.
for_range_desc=Itera sobre a variável v começando em "from", incrementando em "step" cada vez que for menor que "to". A cada iteração, avalia a expressão e, e envia o resultado para a matriz de resultados.
if_desc=Avalia a expressão o. Se for verdadeiro, avalia a expressão eTrue e retorna o resultado. Caso contrário, avalia a expressão eFalse e retorna esse resultado.
is_blank_desc=Retorna se o é nulo ou uma cadeia vazia
isempty_string_desc=Retorna se o é uma cadeia vazia
is_error_desc=Retorna se o é um erro
is_non_blank_desc=Retorna se o não é nulo e não uma cadeia vazia
is_not_null_desc=Retorna se o não é nulo
is_null_desc=Retorna se o é nulo
is_numeric_desc=Retorna se o pode representar um número
is_test_desc=Retorna se o pode representar um número
